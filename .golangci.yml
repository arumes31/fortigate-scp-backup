# golangci-lint configuration for FortiSafe (v2 schema).
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
  exclusions:
    rules:
      # Test fakes intentionally have empty method bodies.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
