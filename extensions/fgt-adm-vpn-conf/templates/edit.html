<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FGT ADM VPN Config</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>FGT ADM VPN Config</h1>
    <form action="{{ url_for('edit', id=config.id) }}" method="post">
        <table>
            <tbody>
                <tr>
                    <td>Kundenname</td>
                    <td><input type="text" name="kundenname" value="{{ config.kundenname }}"></td>
                </tr>
                <tr>
                    <td>Standort</td>
                    <td><input type="text" name="standort" value="{{ config.standort }}"></td>
                </tr>
                <tr>
                    <td>Firewallname</td>
                    <td><input type="text" name="firewallname" value="{{ config.firewallname }}"></td>
                </tr>
                <tr>
                    <td>WAN-Interface</td>
                    <td><input type="text" name="wan_interface" value="{{ config.wan_interface }}"></td>
                </tr>
                <tr>
                    <td>LAN-Interface</td>
                    <td><input type="text" name="lan_interface" value="{{ config.lan_interface }}"></td>
                </tr>
                <tr>
                    <td>IPSEC-PSK-RO</td>
                    <td><input type="text" name="ipsec_psk_ro" value="{{ config.ipsec_psk_ro }}"></td>
                </tr>
                <tr>
                    <td>IPSEC-PSK-HCI</td>
                    <td><input type="text" name="ipsec_psk_hci" value="{{ config.ipsec_psk_hci }}"></td>
                </tr>
                <tr>
                    <td>RADIUSMGT (YES/NO)</td>
                    <td><input type="text" name="radiusmgt" value="{{ config.radiusmgt }}"></td>
                </tr>
            </tbody>
        </table>
        <br>
        <input type="submit" value="Update Entry">
    </form>
</body>
</html>
