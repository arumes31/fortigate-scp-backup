<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Netzwerk-Topologie · FortiSafe</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <span class="brand">FORTISAFE_SYS</span>
            <div class="sysinfo">
                <span class="muted">READ-ONLY · SHARED VIEW</span>
            </div>
        </header>

        <main>
            <h1 class="page-title"><span class="accent-bar"></span>{{T .Lang "topo.title"}} <span id="topoMeta" class="muted" style="font-size: 0.55em; margin-left: 10px;"></span></h1>

            <div class="card pad-0" style="position: relative; overflow: hidden;">
                <svg id="topoSvg" width="100%" height="640" style="background: radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.05), transparent 60%), rgba(0,0,0,0.25); display: block; cursor: grab;"></svg>

                <div id="topoTip" style="position: absolute; display: none; background: rgba(10,12,18,0.95); border: 1px solid rgba(255,255,255,0.12); padding: 8px 12px; border-radius: 6px; font-size: 0.82em; max-width: 320px; pointer-events: none; z-index: 20; box-shadow: 0 8px 24px rgba(0,0,0,0.5);">
                    <strong id="topoTipTitle" style="color: #fff;"></strong>
                    <div id="topoTipBody" class="muted" style="margin-top: 4px; white-space: pre-wrap;"></div>
                </div>

                <div id="facePanel" style="position: absolute; top: 0; right: -480px; width: 460px; max-width: 90%; height: 100%; background: rgba(8,10,15,0.97); border-left: 1px solid rgba(255,255,255,0.1); transition: right 0.25s ease; z-index: 30; display: flex; flex-direction: column;">
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.08);">
                        <div>
                            <strong id="faceTitle" style="color: #fff;"></strong>
                            <div id="faceSub" class="muted" style="font-size: 0.82em; margin-top: 2px;"></div>
                        </div>
                        <button onclick="closeFaceplate()" style="background: none; border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 4px; cursor: pointer; padding: 4px 10px;">✕</button>
                    </div>
                    <div id="faceBody" style="padding: 16px; overflow-y: auto; flex: 1;"></div>
                </div>
            </div>
            <p class="muted" style="font-size: 0.8em; margin-top: 10px;">{{T .Lang "topo.hint"}}</p>
        </main>

        <footer class="sysfooter">
            <div>EOF // (C) FORTISAFE_SEC</div>
            <div class="sysfooter-links"><span>SHARED_TOPOLOGY_VIEW</span></div>
        </footer>
    </div>

    <script>window.TOPO_CONFIG = { staticUrl: "/topology/shared/{{.Token}}/data" }; window.I18N = {{i18nJSON .Lang}};</script>
    <script src="/static/ui.js"></script>
    <script src="/static/d3.v7.min.js"></script>
    <script src="/static/topology.js"></script>
</body>
</html>
